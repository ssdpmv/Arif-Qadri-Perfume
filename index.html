body {
    margin: 0;
    font-family: Arial;
    background: black;

}

/* Header */
header {
    text-align: center;
    padding: 20px;
}

header img {
    width: 220px;
}

/* Hero Section */
.hero {
    background: url('https://images.unsplash.com/photo-1594035910387-fea47794261f') center/cover;
    height: 300px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 32px;
    font-weight: bold;
}

/* Products */
.products {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
    gap: 20px;
    padding: 20px;
}

.card {
    background: #111;
    border-radius: 12px;
    padding: 15px;
    text-align: center;
    box-shadow: 0 0 10px rgba(255,215,0,0.3);
}

.card img {
    width: 100%;
    border-radius: 10px;
}

    background: gold;
    color: black;
    padding: 10px;
    border: none;
    margin-top: 10px;
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    background: orange;
}
